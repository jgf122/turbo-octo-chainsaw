<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="韩花亭内部考试系统统一登录">
    <title>韩花亭内部考试系统 统一登录</title>
    
    <!-- CDN预连接 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- 第三方库 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>
    <!-- Supabase库引入 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    <!-- Supabase初始化脚本 -->
    <script>
        const SUPABASE_CONFIG = {
            URL: 'https://aolmkhiumqfhgkxskrhc.supabase.co',
            ANON_KEY: 'sb_publishable_PtxWniDhW4Ny_CxfUZzJQg_eoU1OQTP'
        };

        let supabase = null;

        // 安全初始化Supabase
        function initSupabaseClient() {
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(
                        SUPABASE_CONFIG.URL,
                        SUPABASE_CONFIG.ANON_KEY,
                        {
                            auth: {
                                autoRefreshToken: true,
                                persistSession: true,
                                detectSessionInUrl: false
                            }
                        }
                    );
                    console.log('✅ Supabase客户端初始化成功');
                    return true;
                }
                console.warn('⚠️ Supabase库未加载，将使用本地模式');
                return false;
            } catch (error) {
                console.error('❌ Supabase初始化失败:', error);
                return false;
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', initSupabaseClient);
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brand-orange: #ff7a45;
            --brand-orange-dark: #e66a3a;
            --brand-orange-light: #ff8f66;
            --brand-blue: #165dff;
            --danger: #ff4d4f;
            --success: #52c41a;
            --text-primary: #ffffff;
            --text-secondary: #b8b8d4;
            --text-muted: #6c6c8a;
            --bg-dark-start: #0f0f1e;
            --bg-dark-end: #1a1a36;
            --bg-card: rgba(20, 20, 40, 0.85);
            --border-color: rgba(255, 122, 69, 0.2);
            --border-color-hover: rgba(255, 122, 69, 0.5);
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", -apple-system, BlinkMacSystemFont, sans-serif;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 122, 69, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
                linear-gradient(135deg, var(--bg-dark-start) 0%, var(--bg-dark-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 18s infinite;
        }

        .particle.orange {
            background: rgba(255, 122, 69, 0.35);
            box-shadow: 0 0 10px rgba(255, 122, 69, 0.5);
        }

        .particle.purple {
            background: rgba(124, 58, 237, 0.25);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.4);
        }

        .particle.blue {
            background: rgba(22, 93, 255, 0.2);
            box-shadow: 0 0 10px rgba(22, 93, 255, 0.3);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
                transform: translateY(-50vh) rotate(360deg) scale(1.2);
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        .login-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 55px 45px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(255, 122, 69, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--brand-orange), var(--brand-blue), var(--brand-orange));
            border-radius: 24px;
            z-index: -1;
            opacity: 0.5;
            filter: blur(8px);
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 45px;
            animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-blue) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(255, 122, 69, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 8px 24px rgba(255, 122, 69, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 12px 32px rgba(255, 122, 69, 0.6);
            }
        }

        .brand-title {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 28px;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.3s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.4s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-group label::after {
            content: '*';
            color: var(--danger);
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
            transition: opacity 0.3s;
        }

        .form-input:focus::placeholder {
            opacity: 0.5;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--brand-orange);
            background: rgba(255, 122, 69, 0.08);
            box-shadow: 
                0 0 0 4px rgba(255, 122, 69, 0.1),
                0 0 25px rgba(255, 122, 69, 0.3);
            transform: translateY(-3px);
        }

        .form-input.error {
            border-color: var(--danger);
            background: rgba(255, 77, 79, 0.08);
            animation: inputError 0.5s ease;
        }

        @keyframes inputError {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 2;
        }

        .input-icon:hover {
            color: var(--brand-orange);
            transform: translateY(-50%) scale(1.1);
        }

        .error-message {
            margin-top: 12px;
            font-size: 13px;
            color: var(--danger);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: errorSlideIn 0.3s ease;
            padding: 12px 16px;
            background: rgba(255, 77, 79, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 77, 79, 0.2);
        }

        @keyframes errorSlideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, var(--brand-orange) 0%, var(--brand-orange-dark) 100%);
            color: #ffffff;
            box-shadow: 
                0 4px 15px rgba(255, 122, 69, 0.4),
                0 0 30px rgba(255, 122, 69, 0.2);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 8px 25px rgba(255, 122, 69, 0.6),
                0 0 50px rgba(255, 122, 69, 0.3);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(-1px) scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn.loading {
            pointer-events: none;
        }

        .login-btn.loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        .login-btn.success {
            background: linear-gradient(135deg, var(--success) 0%, #389e0d 100%);
            box-shadow: 
                0 4px 15px rgba(82, 196, 26, 0.4),
                0 0 30px rgba(82, 196, 26, 0.2);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .remember-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.45s both;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .remember-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--brand-orange);
        }

        .remember-checkbox span {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .forgot-password {
            color: var(--brand-orange);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.3s;
            text-decoration: none;
        }

        .forgot-password:hover {
            color: var(--brand-orange-light);
            text-decoration: underline;
        }

        .footer-info {
            text-align: center;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.8s ease 0.6s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer-info p {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.8;
        }

        /* 响应式适配 */
        @media screen and (max-width: 480px) {
            .login-box {
                margin: 15px;
                padding: 30px 22px;
            }

            .brand-logo {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }

            .brand-title {
                font-size: 20px;
            }

            .remember-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    
    <div id="app">
        <div class="login-box">
            <div class="brand-section">
                <div class="brand-logo">🍖</div>
                <h1 class="brand-title">韩花亭内部考试系统</h1>
                <p class="brand-subtitle">UNIFIED LOGIN SYSTEM</p>
            </div>

            <div>
                <div class="form-group">
                    <label>工号</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            class="form-input" 
                            :class="{ error: showError && errorField === 'employeeId' }"
                            v-model="employeeId" 
                            placeholder="请输入您的工号"
                            :disabled="isLoading"
                            autocomplete="username"
                            maxlength="50"
                            @keyup.enter="handleLogin"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input 
                            :type="showPassword ? 'text' : 'password'" 
                            class="form-input"
                            :class="{ error: showError && errorField === 'password' }"
                            v-model="password" 
                            placeholder="请输入您的密码"
                            :disabled="isLoading"
                            autocomplete="new-password"
                            maxlength="100"
                            @keyup.enter="handleLogin"
                        >
                        <span class="input-icon" @click="togglePassword" :title="showPassword ? '隐藏密码' : '显示密码'">
                            {{ showPassword ? '🙈' : '👁️' }}
                        </span>
                    </div>
                </div>

                <div class="remember-section">
                    <label class="remember-checkbox">
                        <input type="checkbox" v-model="rememberEmployeeId">
                        <span>记住工号</span>
                    </label>
                    <label class="remember-checkbox">
                        <input type="checkbox" v-model="rememberPassword">
                        <span>记住密码</span>
                    </label>
                    <span class="forgot-password" @click="handleForgotPassword">忘记密码？</span>
                </div>

                <div v-if="errorMessage" class="error-message">
                    ⚠️ {{ errorMessage }}
                </div>

                <button 
                    class="login-btn" 
                    :class="{ loading: isLoading, success: loginSuccess }"
                    :disabled="isLoading"
                    @click="handleLogin"
                >
                    {{ loginSuccess ? '登录成功 ✓' : (isLoading ? '登录中...' : '登 录') }}
                </button>
            </div>

            <div class="footer-info">
                <p>如有问题，请联系系统管理员</p>
                <p>© 2024 韩花亭 All Rights Reserved</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const { createApp, ref, onMounted } = Vue;

            // 默认员工数据
            const DEFAULT_EMPLOYEES = {
                "HHT001": { id: "HHT001", name: "王博通", password: "hht123456", shop: "韩花亭烤肉一店" },
                "HHT002": { id: "HHT002", name: "赵桥海", password: "hht123456", shop: "韩花亭烤肉一店" },
                "HHT003": { id: "HHT003", name: "吕梦阳", password: "hht123456", shop: "韩花亭烤肉两店" },
                "HHT004": { id: "HHT004", name: "丁文雅", password: "hht123456", shop: "韩花亭烤肉两店" },
                "HHT005": { id: "HHT005", name: "蒋阳", password: "hht123456", shop: "韩花亭烤肉三店" },
                "HHT006": { id: "HHT006", name: "薛发展", password: "hht123456", shop: "韩花亭烤肉三店" }
            };

            // 配置
            const CONFIG = {
                // 修改为根目录，解决GitHub Pages 404问题
                EXAM_SYSTEM_URL: './',
                REMEMBER_EMPLOYEE_ID_KEY: 'hht_remember_employee_id',
                REMEMBER_PASSWORD_KEY: 'hht_remember_password',
                CURRENT_USER_KEY: 'hht_current_user'
            };

            // 安全存储工具
            const safeGetLocalStorage = (key) => {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    return null;
                }
            };

            const safeSetLocalStorage = (key, value) => {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    console.warn('存储失败:', e);
                }
            };

            const safeRemoveLocalStorage = (key) => {
                try {
                    localStorage.removeItem(key);
                } catch (e) {
                    console.warn('删除失败:', e);
                }
            };

            const safeParseJSON = (str, defaultValue) => {
                try {
                    return JSON.parse(str);
                } catch (e) {
                    return defaultValue;
                }
            };

            // 简单加密函数
            const encrypt = (text, key) => {
                const combined = text + '|' + key;
                return btoa(combined.split('').reverse().join(''));
            };

            const decrypt = (encrypted, key) => {
                try {
                    const reversed = atob(encrypted);
                    const combined = reversed.split('').reverse().join('');
                    const parts = combined.split('|');
                    if (parts.length === 2 && parts[1] === key) {
                        return parts[0];
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            };

            createApp({
                setup() {
                    const employeeId = ref('');
                    const password = ref('');
                    const showPassword = ref(false);
                    const isLoading = ref(false);
                    const loginSuccess = ref(false);
                    const errorMessage = ref('');
                    const showError = ref(false);
                    const errorField = ref('');
                    const rememberEmployeeId = ref(false);
                    const rememberPassword = ref(false);

                    // 切换密码显示
                    const togglePassword = () => {
                        showPassword.value = !showPassword.value;
                    };

                    // 忘记密码
                    const handleForgotPassword = () => {
                        alert('如有问题，请联系系统管理员');
                    };

                    // 清除错误
                    const clearError = () => {
                        errorMessage.value = '';
                        showError.value = false;
                        errorField.value = '';
                    };

                    // 显示错误
                    const showErrorMsg = (msg, field = '') => {
                        errorMessage.value = msg;
                        showError.value = true;
                        errorField.value = field;
                    };

                    // 加载保存的信息
                    const loadSavedInfo = () => {
                        // 加载记住的工号
                        const savedEmpId = safeGetLocalStorage(CONFIG.REMEMBER_EMPLOYEE_ID_KEY);
                        if (savedEmpId) {
                            employeeId.value = savedEmpId;
                            rememberEmployeeId.value = true;

                            // 尝试加载记住的密码
                            const savedPasswordData = safeGetLocalStorage(CONFIG.REMEMBER_PASSWORD_KEY);
                            if (savedPasswordData) {
                                const data = safeParseJSON(savedPasswordData, null);
                                if (data && data.employeeId === savedEmpId && data.encryptedPassword) {
                                    const key = md5(savedEmpId + 'hht_secret');
                                    const decryptedPassword = decrypt(data.encryptedPassword, key);
                                    if (decryptedPassword) {
                                        password.value = decryptedPassword;
                                        rememberPassword.value = true;
                                    }
                                }
                            }
                        }
                    };

                    // 保存信息
                    const saveInfo = () => {
                        // 保存工号
                        if (rememberEmployeeId.value && employeeId.value) {
                            safeSetLocalStorage(CONFIG.REMEMBER_EMPLOYEE_ID_KEY, employeeId.value);
                        } else {
                            safeRemoveLocalStorage(CONFIG.REMEMBER_EMPLOYEE_ID_KEY);
                        }

                        // 保存密码
                        if (rememberPassword.value && employeeId.value && password.value) {
                            const key = md5(employeeId.value + 'hht_secret');
                            const encrypted = encrypt(password.value, key);
                            safeSetLocalStorage(CONFIG.REMEMBER_PASSWORD_KEY, JSON.stringify({
                                employeeId: employeeId.value,
                                encryptedPassword: encrypted
                            }));
                        } else if (!rememberPassword.value) {
                            safeRemoveLocalStorage(CONFIG.REMEMBER_PASSWORD_KEY);
                        }
                    };

                    // 验证员工（支持Supabase和本地双模式）
                    const validateEmployee = async (empId, pwd) => {
                        // 先尝试Supabase验证
                        if (typeof supabase !== 'undefined' && supabase) {
                            try {
                                const { data, error } = await supabase
                                    .from('users')
                                    .select('*')
                                    .eq('employee_id', empId)
                                    .eq('password', pwd)
                                    .maybeSingle();

                                if (error) {
                                    console.warn('Supabase验证失败，切换到本地模式:', error);
                                } else if (data) {
                                    return { 
                                        success: true, 
                                        employee: {
                                            id: data.employee_id,
                                            name: data.name,
                                            password: data.password,
                                            shop: data.department || '未知部门'
                                        }
                                    };
                                }
                            } catch (e) {
                                console.warn('Supabase请求异常，切换到本地模式:', e);
                            }
                        }

                        // 本地备用验证
                        const emp = DEFAULT_EMPLOYEES[empId];
                        if (!emp) {
                            return { success: false, message: '工号不存在' };
                        }
                        if (emp.password !== pwd) {
                            return { success: false, message: '密码错误' };
                        }
                        return { success: true, employee: emp };
                    };

                    // 跳转到考试系统（直接跳转到根目录）
                    const goToExamSystem = () => {
                        console.log('正在跳转到考试系统...');
                        window.location.href = CONFIG.EXAM_SYSTEM_URL;
                    };

                    // 登录处理
                    const handleLogin = async () => {
                        clearError();

                        // 验证输入
                        if (!employeeId.value.trim()) {
                            showErrorMsg('请输入工号', 'employeeId');
                            return;
                        }
                        if (!password.value) {
                            showErrorMsg('请输入密码', 'password');
                            return;
                        }

                        isLoading.value = true;

                        try {
                            // 模拟网络延迟
                            await new Promise(resolve => setTimeout(resolve, 500));

                            // 验证
                            const result = await validateEmployee(employeeId.value.trim(), password.value);
                            
                            if (!result.success) {
                                showErrorMsg(result.message, 'password');
                                return;
                            }

                            // 登录成功
                            loginSuccess.value = true;
                            console.log('登录成功，用户:', result.employee.name);

                            // 保存当前用户信息
                            const currentUserInfo = {
                                employee_id: result.employee.id,
                                name: result.employee.name,
                                shop: result.employee.shop,
                                loginTime: new Date().toISOString()
                            };
                            safeSetLocalStorage(CONFIG.CURRENT_USER_KEY, JSON.stringify(currentUserInfo));

                            // 保存信息（记住工号/密码）
                            saveInfo();

                            // 立即跳转（优先级最高）
                            setTimeout(() => {
                                goToExamSystem();
                            }, 800);

                        } catch (error) {
                            console.error('登录错误:', error);
                            showErrorMsg('登录失败，请稍后重试');
                        } finally {
                            isLoading.value = false;
                        }
                    };

                    // 创建粒子效果
                    const createParticles = () => {
                        const container = document.getElementById('particles-container');
                        if (!container) return;
                        
                        const particleCount = Math.min(40, Math.floor(window.innerWidth / 35));
                        const fragment = document.createDocumentFragment();
                        const colors = ['orange', 'purple', 'blue'];
                        
                        for (let i = 0; i < particleCount; i++) {
                            const particle = document.createElement('div');
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            particle.className = `particle ${color}`;
                            const size = Math.random() * 8 + 3;
                            particle.style.width = `${size}px`;
                            particle.style.height = `${size}px`;
                            particle.style.left = `${Math.random() * 100}%`;
                            particle.style.animationDuration = `${Math.random() * 12 + 12}s`;
                            particle.style.animationDelay = `${Math.random() * 18}s`;
                            particle.style.opacity = Math.random() * 0.6 + 0.3;
                            fragment.appendChild(particle);
                        }
                        
                        container.appendChild(fragment);
                    };

                    onMounted(() => {
                        loadSavedInfo();
                        createParticles();
                        console.log('登录系统已加载完成');
                    });

                    return {
                        employeeId,
                        password,
                        showPassword,
                        isLoading,
                        loginSuccess,
                        errorMessage,
                        showError,
                        errorField,
                        rememberEmployeeId,
                        rememberPassword,
                        togglePassword,
                        handleForgotPassword,
                        handleLogin
                    };
                }
            }).mount('#app');
        })();
    </script>
</body>
</html>
